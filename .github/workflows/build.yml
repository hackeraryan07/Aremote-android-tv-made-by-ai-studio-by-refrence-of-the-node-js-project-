name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Debug Keystore
        env:
          DEBUG_KEY: ${{ secrets.DEBUG_KEY }}
        run: |
          if [ -n "$DEBUG_KEY" ]; then
            # Decode the base64 keystore
            echo "$DEBUG_KEY" | base64 --decode > debug.keystore
            
            # Place in the typical paths where the Android build might look for it
            mkdir -p ~/.android
            cp debug.keystore ~/.android/debug.keystore
            cp debug.keystore app/debug.keystore 2>/dev/null || true
          else
            echo "No DEBUG_KEY secret found. Proceeding with auto-generated debug keystore."
          fi

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
